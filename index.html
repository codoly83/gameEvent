<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>동전을 받아라!</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/fonts-archive/DOSIyagi/DOSIyagi.css"
      type="text/css"
    />
    <link rel="stylesheet" href="./assets/css/result-popup.css" />
    <link rel="stylesheet" href="./assets/css/event-buttons.css" />
    <style></style>
  </head>
  <body>
    <div class="game-gate">
      <input
        type="text"
        id="gameGateInput"
        class="gameGateInput"
        placeholder="닉네임을 입력하세요"
        maxlength="8"
        minlength="2"
      />
      <a href="javascript:GameBridge.startGame()" class="gameStart">start</a>
    </div>
    <!-- Phaser 캔버스 영역 -->
    <div id="root"></div>

    <!-- 캔버스 외부 결과 팝업 (GameBridge 콜백으로 표시) -->
    <div id="result-popup-root" hidden></div>

    <!-- 캔버스 외부 이벤트 버튼 패널 -->
    <div id="event-buttons-root" hidden></div>

    <div class="cover"></div>

    <div class="plus-loading-wrap" id="loading-screen">
      <div class="inner-loading-box"></div>
    </div>

    <script src="./assets/js/phaser.min.js"></script>
    <script type="module" src="./assets/js/main.js?v=251124"></script>
  </body>
</html>
